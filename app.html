<!DOCTYPE html>
<head>
  <title>Sign Aura</title>
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
    crossorigin="anonymous"
  ></script>
  <script src="anime.min.js"></script>

  <link rel="stylesheet" type="text/css" href="styles.css" />
</head>
<body>
  <div id="overlay">
    <div id="overlay-text"></div>
  </div>
  <div class="navbar">
    <div class="nav-items">
      <h1 class="title">Sign Aura</h1>
      <span id="filler"></span>
      <div class="language-selector">
        <button onclick="setLanguage('english')" class="lang-button active" id="lang-english">English</button>
        <button onclick="setLanguage('telugu')" class="lang-button" id="lang-telugu">Telugu</button>
        <button onclick="setLanguage('tamil')" class="lang-button" id="lang-tamil">Tamil</button>
      </div>
      <div class="input">
        <input id="room-input" class="room-input" placeholder="Enter Room ID" />
        <button
          onclick="createRoom()"
          class="button-32"
          id="create-button"
          role="button"
        >
          Create Room
        </button>
        <button
          onclick="joinRoom()"
          class="button-32"
          id="join-button"
          role="button"
        >
          Join Room
        </button>
      </div>
    </div>
  </div>
  <div class="meet-area">
    <div class="remote-container">
      <video id="remote-video" autoplay></video>
      <canvas id="remote-mediapipes-output"></canvas>
    </div>
    <video id="local-video"></video>
  </div>
</body>
<script defer src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script defer src="script.js"></script>
<script defer type="module">
  const remote_video = document.getElementById("remote-video");
  const canvasElement = document.getElementById("remote-mediapipes-output");
  const canvasCtx = canvasElement.getContext("2d");
  
  let currentLanguage = 'english';
  
  window.setLanguage = function(lang) {
    currentLanguage = lang;
    document.querySelectorAll('.lang-button').forEach(btn => btn.classList.remove('active'));
    document.getElementById('lang-' + lang).classList.add('active');
  };

  let finger = {
    thumb: {
      angle_sum: 0,
      straightness: 0,
    },
    index: {
      angle_sum: 0,
      straightness: 0,
    },
    middle: {
      angle_sum: 0,
      straightness: 0,
    },
    ring: {
      angle_sum: 0,
      straightness: 0,
    },
    pinky: {
      angle_sum: 0,
      straightness: 0,
    },
  };

  function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(
      results.image,
      0,
      0,
      canvasElement.width,
      canvasElement.height
    );
    if (results.multiHandLandmarks) {
      for (const landmarks of results.multiHandLandmarks) {
        if (landmarks.length == 21) {
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
            color: "#00FF00",
            lineWidth: 0.5,
          });
          drawLandmarks(canvasCtx, landmarks, {
            color: "#FF0000",
            lineWidth: 0.5,
          });

          const L = landmarks;
          for (let i = 0; i < L.length; i++) {
            L[i].x -= L[0].x;
            L[i].y -= L[0].y;
            L[i].z -= L[0].z;
          }
          // angles made here
          finger.thumb.angle_sum =
            angle(L[1], L[2], L[3]) + angle(L[2], L[3], L[4]);
          finger.index.angle_sum =
            angle(L[5], L[6], L[7]) + angle(L[6], L[7], L[8]);
          finger.middle.angle_sum =
            angle(L[9], L[10], L[11]) + angle(L[10], L[11], L[12]);
          finger.ring.angle_sum =
            angle(L[13], L[14], L[15]) + angle(L[14], L[15], L[16]);
          finger.pinky.angle_sum =
            angle(L[17], L[18], L[19]) + angle(L[18], L[19], L[20]);
          let index_middle_tip_dist = distance3d(
            L[8].x,
            L[8].y,
            L[8].z,
            L[12].x,
            L[12].y,
            L[12].z
          );

          let predicted_letter = letter(
            finger.thumb.angle_sum,
            finger.index.angle_sum,
            finger.middle.angle_sum,
            finger.ring.angle_sum,
            finger.pinky.angle_sum,
            index_middle_tip_dist,
            currentLanguage
          );
          canvasCtx.font = "6px Arial";
          canvasCtx.fillText(
            Math.floor(finger.thumb.angle_sum),
            landmarks[2].x * canvasElement.width,
            landmarks[2].y * canvasElement.height
          );
          canvasCtx.fillText(
            Math.floor(finger.index.angle_sum),
            landmarks[5].x * canvasElement.width,
            landmarks[5].y * canvasElement.height
          );
          canvasCtx.fillText(
            Math.floor(finger.middle.angle_sum),
            landmarks[9].x * canvasElement.width,
            landmarks[9].y * canvasElement.height
          );
          canvasCtx.fillText(
            Math.floor(finger.ring.angle_sum),
            landmarks[13].x * canvasElement.width,
            landmarks[13].y * canvasElement.height
          );
          canvasCtx.fillText(
            Math.floor(finger.pinky.angle_sum),
            landmarks[17].x * canvasElement.width,
            landmarks[17].y * canvasElement.height
          );
          canvasCtx.font = "30px Arial";
          canvasCtx.fillStyle = "red";
          canvasCtx.fillText(predicted_letter, 5, canvasElement.height / 2);
        }
      }
    }
    canvasCtx.restore();
  }

  const hands = new Hands({
    locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    },
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.3,
  });
  hands.onResults(onResults);

  const doSomethingWithFrame = async (now, metadata) => {
    await hands.send({ image: remote_video });
    remote_video.requestVideoFrameCallback(doSomethingWithFrame);
  };

  remote_video.requestVideoFrameCallback(doSomethingWithFrame);

  function distance3d(x1, y1, z1, x2, y2, z2) {
    return Math.sqrt(
      Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2) + Math.pow(z2 - z1, 2)
    );
  }

  function angle(l1, l2, l3) {
    const v1 = [l2.x - l1.x, l2.y - l1.y, l2.z - l1.z];
    const v2 = [l3.x - l2.x, l3.y - l2.y, l3.z - l2.z];
    const dotproduct = v1.reduce((a, b, i) => a + b * v2[i], 0);
    const v1_mag = Math.hypot(v1[0], v1[1], v1[2]);
    const v2_mag = Math.hypot(v2[0], v2[1], v2[2]);
    const rad = Math.acos(dotproduct / (v1_mag * v2_mag));
    return (rad * 180) / Math.PI;
  }

  function letter(thumb, index, middle, ring, pinky, tip_dist, language = 'english') {
    const letters = {
      english: {
        gesture1: "A", gesture2: "B", gesture3: "C", gesture4: "D", gesture5: "E",
        gesture6: "F", gesture7: "H", gesture8: "I", gesture9: "K", gesture10: "L",
        gesture11: "O", gesture12: "T", gesture13: "U", gesture14: "V", gesture15: "W",
        gesture16: "Y", gesture17: "NA", gesture18: "Hi", gesture19: "i<3u"
      },
      telugu: {
        gesture1: "అ", gesture2: "ఆ", gesture3: "ఇ", gesture4: "ఈ", gesture5: "ఉ",
        gesture6: "ఊ", gesture7: "ఋ", gesture8: "ఌ", gesture9: "ఎ", gesture10: "ఏ",
        gesture11: "ఐ", gesture12: "ఒ", gesture13: "ఓ", gesture14: "ఔ", gesture15: "ఁ",
        gesture16: "ం", gesture17: "ః", gesture18: "క", gesture19: "ఖ"
      },
      tamil: {
        gesture1: "அ", gesture2: "ஆ", gesture3: "இ", gesture4: "ஈ", gesture5: "உ",
        gesture6: "ஊ", gesture7: "எ", gesture8: "ஏ", gesture9: "ஐ", gesture10: "ஒ",
        gesture11: "ஓ", gesture12: "ஔ", gesture13: "ங", gesture14: "ச", gesture15: "ஞ",
        gesture16: "ட", gesture17: "ண", gesture18: "த", gesture19: "ந"
      }
    };

    const lang = letters[language] || letters['english'];

    if (index > 50 && middle > 50 && ring > 50 && pinky > 50) {
      if (middle <= 170 && ring <= 170) {
        if (thumb > 80) {
          return lang.gesture3;
        } else {
          return lang.gesture11;
        }
      }
      if (thumb > 80) {
        return lang.gesture5;
      } else if (thumb > 20 && thumb <= 80) {
        return lang.gesture12;
      } else {
        return lang.gesture1;
      }
    }
    if (middle > 50 && ring > 50 && pinky > 50) {
      if (thumb > 70) {
        return lang.gesture4;
      } else {
        return lang.gesture10;
      }
    }
    if (index > 50 && middle > 50 && ring > 50) {
      if (thumb > 70) {
        return lang.gesture8;
      } else {
        return lang.gesture16;
      }
    }
    if (ring > 50 && pinky > 50) {
      if (thumb > 70) {
        if (tip_dist > 0.2) {
          return lang.gesture14;
        } else {
          return lang.gesture13;
        }
      } else {
        if (tip_dist > 0.2) {
          return lang.gesture9;
        } else {
          return lang.gesture7;
        }
      }
    }
    if (middle > 70 && ring > 70) {
      if (thumb < 20) {
        return lang.gesture19;
      }
    }
    if (pinky > 50) {
      if (thumb > 20) {
        return lang.gesture15;
      }
    }
    if (index > 50) {
      if (thumb > 20) {
        return lang.gesture6;
      }
    }
    if (thumb > 40) {
      return lang.gesture2;
    }
    if (thumb > 15) {
      return lang.gesture18;
    }
    return lang.gesture17;
  }
</script>
